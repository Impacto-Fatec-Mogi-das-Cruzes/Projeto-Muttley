# Development profile - override defaults here
spring.application.name=muttley

# DataSource Configuration (Local MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/muttley_dev
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT
jwt.secret=dev-secret-key-change-in-production
jwt.expiration=86400000

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# Multipart
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# AWS S3 (can be disabled in dev)
aws.s3.bucket=dev-bucket
aws.s3.region=us-east-1
aws.s3.access-key-id=dev-key
aws.s3.secret-access-key=dev-secret
aws.s3.endpoint=http://localhost:9000
aws.s3.public-base-url=http://localhost:9000

# Public URLs
app.public-base-url=http://localhost:3000
pdf.public-base-url=http://localhost:8080

# CORS allowed origins (comma-separated) - covers Vite (5173) and CRA (3000)
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Email Service (can be mocked in dev)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=dev
spring.mail.password=dev
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
