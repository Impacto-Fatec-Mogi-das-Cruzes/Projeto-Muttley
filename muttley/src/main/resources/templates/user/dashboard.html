<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard do Participante</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-box animate-fade-up">
      <div class="auth-header">
        <h1 class="auth-title">Área do Participante</h1>
        <p class="auth-subtitle" th:text="${#authentication != null ? #authentication.name : ''}">usuário</p>
      </div>
      <div class="auth-card">
        <button class="btn btn-primary" type="button" onclick="loadDashboard()">Atualizar meus dados</button>
        <pre id="output" style="white-space:pre-wrap; margin-top:12px;"></pre>
        <form th:action="@{/logout}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button class="btn btn-primary" type="submit">Sair</button>
        </form>
      </div>
    </div>
  </div>
  <script>
    async function loadDashboard() {
      const output = document.getElementById("output");
      try {
        const response = await fetch("/api/user/dashboard");
        if (response.status === 401 || response.status === 403) {
          window.location.href = "/login";
          return;
        }
        const data = await response.json();
        output.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        output.textContent = "Erro ao carregar dashboard: " + error.message;
      }
    }
    loadDashboard();
  </script>
</body>
</html>
