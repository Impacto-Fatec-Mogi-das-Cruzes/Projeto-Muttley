spring.application.name=muttley

# DataSource Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Multipart (signature upload)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# AWS S3
aws.s3.bucket=${AWS_S3_BUCKET}
aws.s3.region=${AWS_S3_REGION}
aws.s3.access-key-id=${AWS_ACCESS_KEY_ID}
aws.s3.secret-access-key=${AWS_SECRET_ACCESS_KEY}
aws.s3.endpoint=${AWS_S3_ENDPOINT}
aws.s3.public-base-url=${AWS_S3_PUBLIC_BASE_URL}

# Public frontend URLs (registration/presence forms)
app.public-base-url=${APP_PUBLIC_BASE_URL}

# CORS allowed origins (comma-separated). Falls back to APP_PUBLIC_BASE_URL.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:${APP_PUBLIC_BASE_URL}}

# Pdf Service
pdf.public-base-url=${PDF_PUBLIC_BASE_URL}

# Email Service
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_TLS}