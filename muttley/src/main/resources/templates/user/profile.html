<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Área do participante</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-box animate-fade-up">
      <div class="auth-header">
        <img class="auth-logo" th:src="@{/img/fatec-logo.png}" alt="FATEC Zona Leste" onerror="this.style.display='none'" />
        <h1 class="auth-title">Área do participante</h1>
        <p class="auth-subtitle" th:text="${#authentication != null ? #authentication.name : ''}">email</p>
      </div>
      <div class="auth-card">
        <p class="text-sm text-muted-foreground mb-3">Você está autenticado como usuário.</p>
        <form th:action="@{/logout}" method="post" class="flex gap-2 flex-wrap">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button class="btn btn-primary" type="submit" style="justify-content:center">Sair</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
